name: Build Hugo

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    - uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: '0.124.1'
        extended: true

    - name: Build
      run: hugo --minify

    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        publish_dir: ./public
        github_token: ${{ secrets.GITHUB_TOKEN }}
