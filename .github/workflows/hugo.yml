name: Build Hugo

on:
 push:
   branches: [main]

permissions:
  contents: write
  
jobs:

 build:

  runs-on: ubuntu-latest

  steps:

  - uses: actions/checkout@v4
    with:
      submodules: true

  - uses: peaceiris/actions-hugo@v3
    with:
      hugo-version: 'latest'

  - run: hugo --minify

  - uses: peaceiris/actions-gh-pages@v3
    with:
      publish_dir: ./public
      github_token: ${{ secrets.GITHUB_TOKEN }}
