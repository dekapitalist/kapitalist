backend:
  name: github
  repo: dekapitalist/kapitalist
  branch: main
  base_url: https://decap-auth.barres-70-nouveau-546.workers.dev
  auth_endpoint: auth

media_folder: "static/images"
public_folder: "/images"

collections:

- name: "posts"
  label: "Blog posts"
  folder: content/posts/{{year}}
  slug: "{{slug}}"
  create: true

  fields:
    - { label: "Title", name: "title", widget: "string" }
    - { label: "Date", name: "date", widget: "datetime" }
    - { label: "Description", name: "description", widget: "string" }
    - { label: "Body", name: "body", widget: "markdown" }
